<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting Eligibility Checker</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-r from-blue-500 to-cyan-400 min-h-screen flex items-center justify-center"
  >
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
      <h2 class="text-2xl font-bold text-center mb-6">
        Voting Eligibility Checker
      </h2>

      <!-- Name -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-1">Enter Name</label>
        <input
          type="text"
          id="name"
          placeholder="Your Name"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Age -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-1">Enter Age</label>
        <input
          type="number"
          id="age"
          placeholder="Your Age"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Button -->
      <button
        onclick="checkEligibility()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition"
      >
        Check Eligibility
      </button>
    </div>

    <script>
      function checkEligibility() {
        const name = document.getElementById("name").value.trim();
        let age = document.getElementById("age").value;

        // Validation
        if (name === "" || age === "") {
          alert(" Please enter both name and age");
          return;
        }

        age = parseInt(age);

        if (age < 0) {
          alert(" Invalid age entered");
          return;
        }

        // Logic
        if (age >= 18) {
          alert("broh " + name + ", vote chyean pettum");
        } else {
          const yearsLeft = 18 - age;
          alert(name + ", broh age ayiitla soory pinnea vayyoo ");
        }
      }
    </script>
  </body>
</html>
